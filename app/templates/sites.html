{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
    <!-- Header -->
    <div class="flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-gray-900">Sites Management</h1>
            <p class="text-gray-600 mt-1">Manage NS Fulfillment Centers and sites</p>
        </div>
        <button 
            onclick="document.getElementById('createSiteModal').classList.remove('hidden')"
            class="bg-walmart-blue hover:bg-walmart-blue-hover text-white px-6 py-3 rounded-lg font-semibold shadow-md transition">
            + Add New Site
        </button>
    </div>

    <!-- Sites List -->
    <div id="sites-list">
        {% include "components/sites_list.html" %}
    </div>
</div>

<!-- Create Site Modal -->
<div id="createSiteModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4">
        <div class="p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-gray-900">Add New Site</h2>
                <button 
                    onclick="document.getElementById('createSiteModal').classList.add('hidden')"
                    class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            
            <form hx-post="/sites/create" hx-target="#sites-list" hx-swap="innerHTML" 
                  hx-on::after-request="if(event.detail.successful) document.getElementById('createSiteModal').classList.add('hidden')">
                <div class="space-y-4">
                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-700 mb-1">
                            Site Name <span class="text-walmart-red">*</span>
                        </label>
                        <input 
                            type="text" 
                            id="name" 
                            name="name" 
                            required
                            placeholder="e.g., Portland Fulfillment Center"
                            class="w-full px-4 py-2 border border-walmart-gray-border rounded-lg focus:ring-2 focus:ring-walmart-blue focus:border-transparent">
                    </div>
                    
                    <div>
                        <label for="code" class="block text-sm font-medium text-gray-700 mb-1">
                            Site Code <span class="text-walmart-red">*</span>
                        </label>
                        <input 
                            type="text" 
                            id="code" 
                            name="code" 
                            required
                            placeholder="e.g., PDX1"
                            class="w-full px-4 py-2 border border-walmart-gray-border rounded-lg focus:ring-2 focus:ring-walmart-blue focus:border-transparent">
                    </div>
                    
                    <div>
                        <label for="location" class="block text-sm font-medium text-gray-700 mb-1">
                            Location
                        </label>
                        <input 
                            type="text" 
                            id="location" 
                            name="location"
                            placeholder="e.g., Portland, OR"
                            class="w-full px-4 py-2 border border-walmart-gray-border rounded-lg focus:ring-2 focus:ring-walmart-blue focus:border-transparent">
                    </div>
                    
                    <div>
                        <label for="site_type" class="block text-sm font-medium text-gray-700 mb-1">
                            Type
                        </label>
                        <select 
                            id="site_type" 
                            name="site_type"
                            class="w-full px-4 py-2 border border-walmart-gray-border rounded-lg focus:ring-2 focus:ring-walmart-blue focus:border-transparent">
                            <option value="FC">Fulfillment Center (FC)</option>
                            <option value="DC">Distribution Center (DC)</option>
                            <option value="SC">Sortation Center (SC)</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                
                <div class="mt-6 flex space-x-3">
                    <button 
                        type="submit"
                        class="flex-1 bg-walmart-blue hover:bg-walmart-blue-hover text-white px-6 py-3 rounded-lg font-semibold transition">
                        Create Site
                    </button>
                    <button 
                        type="button"
                        onclick="document.getElementById('createSiteModal').classList.add('hidden')"
                        class="px-6 py-3 border border-walmart-gray-border rounded-lg font-semibold hover:bg-gray-50 transition">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
