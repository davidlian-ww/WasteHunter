<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TIMWOOD Waste Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="/static/tailwind.min.css">
    <script src="/static/htmx.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        .htmx-indicator {
            opacity: 0;
            transition: opacity 200ms ease-in;
        }
        .htmx-request .htmx-indicator {
            opacity: 1;
        }
        .htmx-request.htmx-indicator {
            opacity: 1;
        }
        .waste-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        .severity-critical { background: #ea1100; color: white; }
        .severity-high { background: #ff6b35; color: white; }
        .severity-medium { background: #ffc220; color: #995213; }
        .severity-low { background: #e6f4ea; color: #2a8703; }
        .status-open { background: #ea1100; color: white; }
        .status-in-progress { background: #ffc220; color: #995213; }
        .status-resolved { background: #2a8703; color: white; }
        .status-closed { background: #74767b; color: white; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-walmart-blue text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-8">
                    <a href="/" class="text-2xl font-bold flex items-center space-x-2">
                        <span>🗑️</span>
                        <span>TIMWOOD Dashboard</span>
                    </a>
                    <div class="flex space-x-4">
                        <a href="/" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-walmart-blue-hover transition">
                            Dashboard
                        </a>
                        <a href="/sites" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-walmart-blue-hover transition">
                            Sites
                        </a>
                        <a href="/paths" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-walmart-blue-hover transition">
                            Process Paths
                        </a>
                    </div>
                </div>
                <div class="text-sm">
                    <span class="px-3 py-1 bg-walmart-spark text-walmart-warning rounded-md font-semibold">
                        7 Wastes Study
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Loading Indicator -->
    <div id="loading-indicator" class="htmx-indicator fixed top-20 right-4 bg-walmart-blue text-white px-4 py-2 rounded-lg shadow-lg">
        <div class="flex items-center space-x-2">
            <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span>Loading...</span>
        </div>
    </div>

    <script>
        // Global HTMX config
        document.body.addEventListener('htmx:configRequest', (event) => {
            // Add loading indicator to all requests
            event.detail.indicators = ['#loading-indicator'];
        });

        // Success notifications
        document.body.addEventListener('htmx:afterSwap', (event) => {
            // Could add toast notifications here
            console.log('Content updated successfully');
        });
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
